name: Create and publish container image

on:
  push:
    tags:
      - 'v**'
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oidc-php-client
  BASE_IMAGE_DOCKERFILE: ./Dockerfile

jobs:

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for container
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/ucidentity/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},latest=true
            type=semver,pattern={{major}}.{{minor}}
            type=match,pattern=\d{8},latest=true
        env:
          #DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          #platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
